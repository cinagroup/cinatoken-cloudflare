name = "cinatoken-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 开发环境配置
[env.dev]
name = "cinatoken-backend-dev"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "APP_KV"
id = "c249f108b5a34bb3b542251c5b428a81"
preview_id = "c249f108b5a34bb3b542251c5b428a81"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "cinatoken-db-prod"
database_id = "bd3330af-cb92-4d9d-9c22-5c7a4fed8e67"

# R2 存储桶绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "cinatoken-static"

# 环境变量
[vars]
ENVIRONMENT = "dev"
APP_NAME = "CinaToken"
LOG_LEVEL = "debug"

# 生产环境配置
[env.production]
name = "cinatoken-backend"
workers_dev = true

[[env.production.kv_namespaces]]
binding = "APP_KV"
id = "c249f108b5a34bb3b542251c5b428a81"

[[env.production.d1_databases]]
binding = "DB"
database_name = "cinatoken-db-prod"
database_id = "bd3330af-cb92-4d9d-9c22-5c7a4fed8e67"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "cinatoken-static"

[env.production.vars]
ENVIRONMENT = "production"
APP_NAME = "CinaToken"
LOG_LEVEL = "info"

	# 自定义域名通过 Cloudflare Dashboard 管理
	# 或使用: wrangler deploy --env production --route "api.cinatoken.com/*"
	